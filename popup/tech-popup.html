<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestKit — Технологии</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2d3250;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #6366f1;

      --c-framework: #6366f1;
      --c-library:   #a855f7;
      --c-cms:       #f97316;
      --c-analytics: #22c55e;
      --c-ui:        #06b6d4;
      --c-build:     #eab308;
      --c-monitor:   #ef4444;
      --c-other:     #94a3b8;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .header-text { overflow: hidden; }
    .header-title {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .header-url {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-badge {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      background: var(--surface2);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* ── Main content ────────────────────────────────── */
    .content { padding: 12px 14px; }

    /* ── Empty state ─────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      color: var(--muted);
      gap: 8px;
    }
    .empty-icon { font-size: 32px; }

    /* ── Section / category ──────────────────────────── */
    .section {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      cursor: pointer;
      user-select: none;
    }
    .section-header:hover { background: var(--surface2); }
    .section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-name {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .section-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 8px;
      padding: 1px 7px;
    }
    .section-arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s;
    }
    .section.collapsed .section-arrow { transform: rotate(-90deg); }
    .section.collapsed .section-body  { display: none; }

    .section-body {
      padding: 8px 12px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--bg);
    }

    /* ── Tech tag ────────────────────────────────────── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid;
    }
    .tag-version {
      font-size: 10px;
      opacity: 0.7;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    /* ── Stats bar ────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      line-height: 1.2;
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Meta section ────────────────────────────────── */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .meta-row {
      display: flex;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-key {
      flex-shrink: 0;
      width: 90px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }
    .meta-val {
      font-size: 11px;
      color: var(--text);
      word-break: break-all;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Section title ───────────────────────────────── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .meta-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    /* ── Loading ─────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      gap: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── No techs notice ─────────────────────────────── */
    .none-detected {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header" id="header">
    <div class="loading" style="width:100%;height:40px;border:none;">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><span>Анализируем…</span></div>
  </div>

  <script src="tech-popup.js"></script>
</body>
</html>
