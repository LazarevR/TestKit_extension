<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestKit — Meta Tags</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2d3250;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #6366f1;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px; line-height: 1.5; min-height: 100vh;
    }
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    }
    .header-favicon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
    .header-text { overflow: hidden; }
    .header-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-url   { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-badge { margin-left: auto; flex-shrink: 0; font-size: 11px; background: var(--surface2); color: var(--muted); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }

    .content { padding: 12px 14px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1.2; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .section { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .section-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface); cursor: pointer; user-select: none; }
    .section-header:hover { background: var(--surface2); }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .section-count { margin-left: auto; font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 8px; padding: 1px 7px; }
    .section-arrow { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
    .section.collapsed .section-arrow { transform: rotate(-90deg); }
    .section.collapsed .section-body  { display: none; }
    .section-body { background: var(--bg); }

    /* ── Meta tag rows ────────────────────────── */
    .tag-row {
      display: grid;
      grid-template-columns: 155px 1fr;
      column-gap: 10px;
      row-gap: 2px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .tag-row:last-child { border-bottom: none; }
    .tag-row.tag-absent { background: #ef444406; }

    .tag-key {
      font-size: 11px; font-weight: 600;
      color: #94a3b8;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      align-self: start; padding-top: 1px;
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .tag-val {
      font-size: 11px; color: var(--text);
      word-break: break-word; align-self: start;
    }
    .tag-val.absent { color: #334155; font-style: italic; }
    .tag-desc {
      grid-column: 2;
      font-size: 10px; color: #475569; line-height: 1.4;
    }

    .absent-badge {
      font-size: 9px; font-weight: 700;
      padding: 1px 5px; border-radius: 4px;
      background: #ef444420; color: #ef4444; border: 1px solid #ef444440;
      letter-spacing: 0.04em; white-space: nowrap;
    }

    .footer { text-align: center; padding: 8px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 4px; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 16px; color: var(--muted); gap: 8px; }
    .empty-icon { font-size: 32px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); gap: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>
  <div class="header" id="header">
    <div class="loading" style="width:100%;height:40px;border:none;"><div class="spinner"></div></div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><span>Читаем мета-теги…</span></div>
  </div>
  <script src="meta-popup.js"></script>
</body>
</html>
