<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestKit — HTTP Headers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2d3250;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --accent:   #6366f1;
    }
    html, body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px; line-height: 1.5; min-height: 100vh;
    }
    .sticky-top { position: sticky; top: 0; z-index: 10; }
    .nav-bar { display: flex; gap: 4px; padding: 6px 10px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-btn { flex: 1; padding: 5px 6px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--muted); font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.1s, color 0.1s; }
    .nav-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: var(--surface2); color: var(--accent); border-color: var(--border); cursor: default; }

    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    }
    .header-favicon { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
    .header-text { overflow: hidden; }
    .header-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-url   { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-badge { margin-left: auto; flex-shrink: 0; font-size: 11px; background: var(--surface2); color: var(--muted); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }

    .content { padding: 12px 14px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); line-height: 1.2; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .section { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .section-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface); cursor: pointer; user-select: none; }
    .section-header:hover { background: var(--surface2); }
    .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .section-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .section-count { margin-left: auto; font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 8px; padding: 1px 7px; }
    .section-arrow { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
    .section.collapsed .section-arrow { transform: rotate(-90deg); }
    .section.collapsed .section-body  { display: none; }
    .section-body { background: var(--bg); }

    .hdr-row { display: flex; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .hdr-row:last-child { border-bottom: none; }
    .hdr-row.hdr-missing  { background: #ef444406; }
    .hdr-row.hdr-warn-row { background: #f9731606; }

    .hdr-status { flex-shrink: 0; width: 18px; font-size: 13px; font-weight: 700; padding-top: 2px; text-align: center; }
    .hdr-ok   { color: #22c55e; }
    .hdr-miss { color: #ef4444; }
    .hdr-warn { color: #f97316; }
    .hdr-na   { color: #334155; font-size: 9px; padding-top: 4px; }

    .hdr-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .hdr-name { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .hdr-abbr { font-size: 10px; background: var(--surface2); color: var(--muted); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); }
    .hdr-value { font-size: 11px; color: #7dd3fc; font-family: ui-monospace, "SF Mono", Menlo, monospace; word-break: break-all; line-height: 1.4; }
    .hdr-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .hdr-na-desc { font-size: 11px; color: #2d3250; }
    .hdr-tip {
      font-size: 11px; color: #86efac;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      background: #052e1620; padding: 4px 8px;
      border-radius: 4px; border: 1px solid #14532d30;
      word-break: break-all; line-height: 1.5; margin-top: 2px;
    }
    .sev-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; border: 1px solid; letter-spacing: 0.04em; }

    .meta-grid { display: flex; flex-direction: column; }
    .meta-row { display: flex; gap: 8px; padding: 5px 12px; border-bottom: 1px solid var(--border); }
    .meta-row:last-child { border-bottom: none; }
    .meta-key { flex-shrink: 0; width: 180px; font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta-val { font-size: 11px; color: var(--text); word-break: break-all; flex: 1; }

    .footer { text-align: center; padding: 8px; font-size: 10px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 4px; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 16px; color: var(--muted); gap: 8px; }
    .empty-icon { font-size: 32px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); gap: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>
  <div class="sticky-top">
    <div class="header" id="header">
      <div class="loading" style="width:100%;height:40px;border:none;"><div class="spinner"></div></div>
    </div>
    <nav class="nav-bar">
      <button class="nav-btn" data-to="tech">🔍 Технологии</button>
      <button class="nav-btn active" data-to="headers">🔐 HTTP-заголовки</button>
      <button class="nav-btn" data-to="meta">🏷️ Meta-теги</button>
    </nav>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><span>Получаем заголовки…</span></div>
  </div>
  <script src="headers-popup.js"></script>
</body>
</html>
